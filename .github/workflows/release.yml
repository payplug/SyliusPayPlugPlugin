name: Release — RC

'on':
    push:
        tags:
            - '*-rc*'

jobs:
    quality:
        uses: payplug/template-ci/.github/workflows/sylius_quality.yml@main

    phpunit:
        needs: [quality]
        uses: payplug/template-ci/.github/workflows/sylius_phpunit.yml@main

    github-release:
        needs: phpunit
        uses: payplug/template-ci/.github/workflows/github_release_rc.yml@main
        secrets: inherit
