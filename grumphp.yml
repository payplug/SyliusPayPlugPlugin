grumphp:
    ascii:
        failed: ~
        succeeded: ~
    tasks:
        git_commit_message:
            matchers:
                - '/^(PRE|SYL|SMP)-\d+: .+/'
        git_branch_name:
            whitelist:
                - '/^(feature|fix|hotfix|refactor|release)\/(PRE|SYL|SMP)-\d+/'
        composer:
            no_check_all: true
        jsonlint:
            detect_key_conflicts: true
        phplint:
            exclude: ['vendor', 'tests/Application/*']
            triggered_by: ['php']
        phpstan:
            level: ~
            configuration: 'ruleset/phpstan.neon'
            use_grumphp_paths: false
            memory_limit: '-1'
        securitychecker_symfony: ~
        yamllint:
            parse_custom_tags: true
        ecs:
            config: 'ruleset/ecs.php'
            clear-cache: true
            no-progress-bar: true
            files_on_pre_commit: false
            paths: ['src', 'tests/Behat', 'tests/PHPUnit']
            triggered_by: ['php', 'phtml', 'twig', 'yaml', 'yml', 'xml', 'json', 'neon', 'lock']
        twigcs:
            path: 'src/'
            severity: error
        phpcs:
            standard: "ruleset"
            warning_severity: 0
            whitelist_patterns:
                - 'src'
            exclude:
                - 'PSR12.Files.FileHeader'